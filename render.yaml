# Render Blueprint (Infrastructure as Code).
# Northstar ships as a static SPA — no server, no cold starts on the free tier.
# Supabase is reached directly from the browser and secured by Row Level Security.
services:
  - type: web
    name: northstar
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    # SPA fallback so deep links like /board resolve to index.html.
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Set these in the Render dashboard / via API — values are public (anon key,
      # protected by RLS) but kept out of source control.
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
